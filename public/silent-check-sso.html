<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
</head>

<body>
    <script>
        // Send the authorization state back to the React app parent window
        // Using '*' ensures the parent frame receives it regardless of strict CSP Worker headers.
        parent.postMessage(location.href, '*');
    </script>
</body>

</html>
